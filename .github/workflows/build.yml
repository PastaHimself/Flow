name: Android CI/CD

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*"
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          cache: gradle

      # Cache build outputs so Gradle can reuse work between CI runs.
      - name: Cache Gradle build cache
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches/build-cache-*
          key: gradle-build-cache-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-build-cache-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.keystore
          else
            echo "Release keystore secret is not available. Skipping decoding."
          fi

      - name: Run unit tests
        run: >
          ./gradlew :app:testGithubNightlyUnitTest :app:testFossReleaseUnitTest
          --parallel --build-cache --no-daemon --stacktrace

      - name: Lint GitHub nightly
        run: >
          ./gradlew :app:lintGithubNightly
          --build-cache --no-daemon --stacktrace

      # Build all variants together so they share configuration and cache data.
      - name: Build all APKs
        run: >
          ./gradlew assembleGithubRelease assembleGithubNightly assembleFossRelease
          --parallel --build-cache --no-daemon --stacktrace
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Verify Discord nightly APK
        run: |
          test -f app/build/outputs/apk/github/nightly/app-github-nightly.apk
          sha256sum app/build/outputs/apk/github/nightly/app-github-nightly.apk | tee app/build/outputs/apk/github/nightly/app-github-nightly.apk.sha256

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-release-apk
          path: app/build/outputs/apk/github/release/app-github-release.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload nightly APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-nightly-apk
          path: |
            app/build/outputs/apk/github/nightly/app-github-nightly.apk
            app/build/outputs/apk/github/nightly/app-github-nightly.apk.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload FOSS release APK
        uses: actions/upload-artifact@v4
        with:
          name: flow-foss-release-apk
          path: app/build/outputs/apk/foss/release/app-foss-release.apk
          if-no-files-found: error
          retention-days: 14

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: flow-release-apk
          path: dist/

      - name: Download FOSS release APK
        uses: actions/download-artifact@v4
        with:
          name: flow-foss-release-apk
          path: dist/

      - name: Rename APKs for release
        run: |
          mv dist/app-github-release.apk dist/flow.apk
          mv dist/app-foss-release.apk dist/flow-foss.apk

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate release notes
        env:
          RELEASE_VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          test -s release-notes.md
          grep -Fqx "# Flow ${RELEASE_VERSION}" release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Flow ${{ steps.get_version.outputs.VERSION }}
          body_path: release-notes.md
          generate_release_notes: false
          files: |
            dist/flow.apk
            dist/flow-foss.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
